<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Weather Query App" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(15,23,42,.08); margin-bottom: 18px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
    input, select, button { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; }
    button { background: #111827; color: white; cursor: pointer; }
    button:hover { opacity: .92; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; background: #e5e7eb; }
    .badge-cache { background: #dbeafe; color: #1d4ed8; }
    .muted { color: #6b7280; }
    .pager a { margin-right: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ title or "Weather Query App" }}</h1>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
